# System profile (Garage on control-plane nodes, hostPath).
# Apply, wait for the cluster to be Ready, then re-apply so the bucket, policy,
# access and the test Job provision against the ready cluster.
#
# Flow (new model):
#   ObjectStorageCluster (cluster-scoped)
#     -> ObjectStorageBucket (cluster-scoped)
#     -> ObjectStorageBucketPolicy (allow the obj-test namespace)
#     -> ObjectStorageBucketAccess (namespaced; issues the creds Secret)
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: ObjectStorageCluster
metadata:
  name: system
spec:
  type: System
  redundancy: Single
  reclaimPolicy: Delete
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: ObjectStorageBucket
metadata:
  name: sys-bucket
spec:
  clusterRef: system
  reclaimPolicy: Delete
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: ObjectStorageBucketPolicy
metadata:
  name: sys-bucket-obj-test
spec:
  bucketRef: sys-bucket
  allowedNamespaces:
    names:
      - obj-test
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: ObjectStorageBucketAccess
metadata:
  name: sys-access
  namespace: obj-test
spec:
  bucketRef: sys-bucket
  permission: ReadWrite
---
apiVersion: batch/v1
kind: Job
metadata:
  name: s3-test-system
  namespace: obj-test
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mc
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mc alias set t "$S3_ENDPOINT" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
              echo "hello from sds-object test at $(date)" | mc pipe "t/$S3_BUCKET/hello.txt"
              echo "--- listing ---"; mc ls "t/$S3_BUCKET"
              echo "--- content ---"; mc cat "t/$S3_BUCKET/hello.txt"
              echo "S3 OK"
          envFrom:
            - secretRef:
                name: sys-access-s3-credentials
