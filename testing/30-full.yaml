# Full profile (SeaweedFS).
# None/Standard use the built-in leveldb metadata store (single filer, no
# external DB). High runs a multi-filer HA set backed by a shared
# managed-postgres database (requires the managed-postgres module).
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: ObjectStore
metadata:
  name: full
spec:
  type: Full
  redundancy: None
  reclaimPolicy: Delete
  storage:
    sizePerNode: 10Gi
    class: localpath   # <-- replace with your StorageClass (kubectl get sc)
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: Bucket
metadata:
  name: full-bucket
spec:
  objectStoreRef: full
  reclaimPolicy: Delete
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: BucketClaimPolicy
metadata:
  name: full-bucket-obj-test
spec:
  bucketRef: full-bucket
  allowedNamespaces:
    names:
      - obj-test
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: BucketClaim
metadata:
  name: full-claim
  namespace: obj-test
spec:
  existingBucketName: full-bucket
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: BucketAccess
metadata:
  name: full-access
  namespace: obj-test
spec:
  bucketClaimName: full-claim
  permission: ReadWrite
---
apiVersion: batch/v1
kind: Job
metadata:
  name: s3-test-full
  namespace: obj-test
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mc
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mc alias set t "$S3_ENDPOINT" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
              echo "hello from sds-object test at $(date)" | mc pipe "t/$S3_BUCKET/hello.txt"
              echo "--- listing ---"; mc ls "t/$S3_BUCKET"
              echo "--- content ---"; mc cat "t/$S3_BUCKET/hello.txt"
              echo "S3 OK"
          envFrom:
            - secretRef:
                name: full-access-s3-credentials
