{{- /*
  Two dockerconfigjson Secrets, mirroring the sds-local-volume /
  sds-replicated-volume layout so that every workload in this chart
  (sds-object-controller via helm_lib_module_controller_manifests, and
  any future workloads) can reference a single, predictable pull-secret
  name without per-workload conditionals.

  * `<chart>-module-registry` holds the module-scoped registry
    credentials. When the operator provides
    `.Values.sdsObject.registry.dockercfg` (a system field overwritten
    by Deckhouse from EE/SE module sources, not from user-facing
    ModuleConfig), it is used as-is. Otherwise we fall back to a
    placeholder `{"auths": {"registry.deckhouse.io": {}}}` so the
    Secret object still exists and imagePullSecrets references stay
    valid. The placeholder is harmless for public images and matches
    what sds-local-volume / sds-replicated-volume ship for the same
    edge case.

  * `deckhouse-registry` mirrors the global modules-registry creds and
    is used by lib-helm CSI helpers (helm_lib_csi_controller_manifests
    / helm_lib_csi_node_manifests) that hardcode that Secret name.
*/ -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Chart.Name }}-module-registry
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" .Chart.Name )) | nindent 2 }}
type: kubernetes.io/dockerconfigjson
data:
{{- if dig "registry" "dockercfg" false .Values.sdsObject }}
  .dockerconfigjson: {{ .Values.sdsObject.registry.dockercfg }}
{{- else }}
  .dockerconfigjson: "eyJhdXRocyI6IHsgInJlZ2lzdHJ5LmRlY2tob3VzZS5pbyI6IHt9fX0="
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: deckhouse-registry
  namespace: d8-{{ .Chart.Name }}
  {{- include "helm_lib_module_labels" (list . (dict "app" .Chart.Name )) | nindent 2 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ .Values.global.modulesImages.registry.dockercfg }}
