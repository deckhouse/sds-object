{{- /*
  Built-in system object storage.

  Ships a cluster-scoped `system` ObjectStore (type System — Garage on
  control-plane nodes with node-sticky local PVs) plus a `system` Shared Bucket
  for platform needs, and a BucketClaimPolicy granting d8-* module namespaces the
  right to bind it via a brownfield BucketClaim (binding is deny-by-default
  otherwise).

  System runs a FIXED 3-replica Garage (a StatefulSet), independent of the
  control-plane node count: replicas spread one-per-node across masters when
  several exist and co-locate on the single master otherwise. Storage is a
  per-replica node-sticky local PV (managed StorageClass sds-object-system-local,
  a controller-provisioned pool of nodeAffinity-pinned PVs), so a replica returns
  to its node — hence its data — after a restart. The replication factor is pinned
  at 3 (spec.redundancy is not set / not allowed for System). Because three Garage
  nodes always run, the quorum tracks the pod count, not the master count: the
  store keeps serving read-write across master-count changes (3<->2<->1), and the
  layout is reconciled as replicas move and rejoin. Co-located replicas share one
  disk, so hardware-level redundancy is only realised while masters allow
  spreading (see DESIGN).
*/ -}}
{{- if .Values.sdsObject.systemBucket.enabled }}
apiVersion: storage.deckhouse.io/v1alpha1
kind: ObjectStore
metadata:
  name: system
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  type: System
  reclaimPolicy: Retain
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: Bucket
metadata:
  name: system
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  objectStoreRef: system
  reclaimPolicy: Retain
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: BucketClaimPolicy
metadata:
  name: system-d8-namespaces
  {{- include "helm_lib_module_labels" (list .) | nindent 2 }}
spec:
  bucketRef: system
  allowedNamespaces:
    patterns:
      - "d8-.*"
{{- end }}
