{{- /*
  RBAC for the sds-object-controller.

  The controller-runtime cache is cluster-scoped by default, so any namespaced
  resource the manager reads (Secret, ConfigMap, Service, ServiceAccount,
  StatefulSet, DaemonSet) requires cluster-wide get/list/watch on the
  ServiceAccount. Mutation of the data-plane objects the Garage driver creates
  (ConfigMap, Service, ServiceAccount, StatefulSet, DaemonSet) stays in the
  namespaced Role — they only ever live in d8-sds-object. Secrets are the
  exception: the ObjectBucket reconciler writes the S3 credentials Secret into
  the consuming application's namespace, so secret write verbs are granted
  cluster-wide. The webhooks share the same ServiceAccount but exercise only
  the read verbs.

  Note for future editors: do not place Helm/Go-template comments inside the
  argument expression of the function call below (the rule lists), the template
  parser fails with 'unexpected "{" in operand'. Keep rule-level commentary in
  this header block.
*/ -}}
{{- $rbacConfig := dict
  "roleRules" (list
    (dict "apiGroups" (list "") "resources" (list "events") "verbs" (list "create" "list" "patch"))
    (dict "apiGroups" (list "") "resources" (list "pods") "verbs" (list "get" "list"))
    (dict "apiGroups" (list "") "resources" (list "secrets" "configmaps" "services" "serviceaccounts") "verbs" (list "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "apps") "resources" (list "statefulsets" "daemonsets") "verbs" (list "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "managed-services.deckhouse.io") "resources" (list "postgres") "verbs" (list "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "coordination.k8s.io") "resources" (list "leases") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
  )
  "clusterRoleRules" (list
    (dict "apiGroups" (list "storage.deckhouse.io") "resources" (list "objectstorageclusters" "objectstorageclusters/status" "objectstorageclusters/finalizers" "objectbuckets" "objectbuckets/status" "objectbuckets/finalizers") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "storage.deckhouse.io") "resources" (list "elasticclusters") "verbs" (list "get" "list" "watch"))
    (dict "apiGroups" (list "internal.sdselastic.deckhouse.io") "resources" (list "cephobjectstores" "cephobjectstoreusers") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "") "resources" (list "secrets") "verbs" (list "get" "list" "watch" "create" "update" "patch" "delete"))
    (dict "apiGroups" (list "") "resources" (list "configmaps" "services" "serviceaccounts") "verbs" (list "get" "list" "watch"))
    (dict "apiGroups" (list "apps") "resources" (list "statefulsets" "daemonsets") "verbs" (list "get" "list" "watch"))
    (dict "apiGroups" (list "managed-services.deckhouse.io") "resources" (list "postgres") "verbs" (list "get" "list" "watch"))
  )
}}
{{ include "helm_lib_module_controller_rbac" (list . $rbacConfig) }}
