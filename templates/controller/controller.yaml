{{- /* Webhook TLS Certs Secret */ -}}
{{- $secretConfig := dict
  "valuesKey" "sdsObject"
  "webhookCertPath" "internal.customWebhookCert"
}}
{{ include "helm_lib_module_webhook_certs_secret" (list . $secretConfig) }}

{{- /* Controller Deployment + VPA + PDB */ -}}
{{- /*
  helm_lib_module_controller_manifests already injects LOG_LEVEL (from
  .Values.sdsObject.logLevel via helm_lib_module_controller_log_level) and
  CONTROLLER_NAMESPACE (valueFrom fieldRef metadata.namespace).
*/ -}}
{{- $config := dict
  "valuesKey" "sdsObject"
  "onMasterNode" true
  "podSecurityContext" "deckhouse"
  "webhookEnabled" true
  "webhookCertPath" "internal.customWebhookCert"
  "additionalControllerEnvs" (list
    (dict "name" "GARAGE_IMAGE" "value" (include "helm_lib_module_image" (list . "garage")))
  )
}}
{{ include "helm_lib_module_controller_manifests" (list . $config) }}

{{- /* Webhook Service */ -}}
{{ include "helm_lib_module_webhook_service" (list . dict) }}

{{- /*
  ValidatingWebhookConfiguration for ObjectStorageCluster.
  Placeholder admission rule wired to the webhooks container (/osc-validate).
*/ -}}
{{- $oscWebhookConfig := dict
  "name" "object-storage-cluster-validation"
  "webhookName" "object-storage-cluster-validation"
  "valuesKey" "sdsObject"
  "path" "/osc-validate"
  "failurePolicy" "Fail"
  "rules" (list
    (dict
      "apiGroups" (list "storage.deckhouse.io")
      "apiVersions" (list "v1alpha1")
      "operations" (list "CREATE" "UPDATE")
      "resources" (list "objectstorageclusters")
      "scope" "Cluster"
    )
  )
}}
{{ include "helm_lib_module_validating_webhook_configuration" (list . $oscWebhookConfig) }}

{{- /*
  ValidatingWebhookConfiguration for ObjectBucket.
  Placeholder admission rule wired to the webhooks container (/ob-validate).
*/ -}}
{{- $obWebhookConfig := dict
  "name" "object-bucket-validation"
  "webhookName" "object-bucket-validation"
  "valuesKey" "sdsObject"
  "path" "/ob-validate"
  "failurePolicy" "Fail"
  "rules" (list
    (dict
      "apiGroups" (list "storage.deckhouse.io")
      "apiVersions" (list "v1alpha1")
      "operations" (list "CREATE" "UPDATE")
      "resources" (list "objectbuckets")
      "scope" "Namespaced"
    )
  )
}}
{{ include "helm_lib_module_validating_webhook_configuration" (list . $obWebhookConfig) }}
