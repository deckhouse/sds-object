{{- /*
  Garage object storage server image.

  Garage is compiled from source (Rust) with the container-base `rust`/`cargo`
  toolchain installed via pm into the module's distroless build base — the same
  approach used by the log-shipper/vector Rust build in Deckhouse.

  The version is taken from oss.yaml (id: garage); keep it in sync with
  garageVersion in images/controller/internal/backend/garage.
*/ -}}
{{- $garageVersion := printf "v%s" (include "get_oss_version_by_id" (list "garage" $)) }}
---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
from: {{ index $.Images "builder/src" }}
final: false

secrets:
- id: SOURCE_REPO
  value: {{ .SOURCE_REPO }}

shell:
  install:
    - git clone --depth 1 --branch {{ $garageVersion }} $(cat /run/secrets/SOURCE_REPO)/deuxfleurs-org/garage.git /src
    - rm -rf /src/.git

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}-artifact
from: {{ index $.Images "builder/distroless" }}
final: false

import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-src-artifact
    add: /src
    to: /src
    before: install

mount:
  - from: tmp_dir
    to: /root/.cargo/registry
  - from: tmp_dir
    to: /src/target

secrets:
- id: CARGO_PROXY
  value: {{ .CargoProxy }}

shell:
  install:
    # rust/cargo + a C toolchain (Garage bundles sqlite/lmdb and links ring,
    # all of which compile C sources via cc during the build).
    - pm install rust cargo gnu-gcc gnu-gcc-devel binutils make pkgconf protobuf
    - export CARGO_HOME=/root/.cargo CARGO_NET_GIT_FETCH_WITH_CLI=true CC=gcc
    - mkdir -p "${CARGO_HOME}"
    # The container-base `rust` package defaults to `clang` as the linker, which
    # is not installed; link with the GNU toolchain (gnu-gcc) instead.
    - echo '[target.x86_64-unknown-linux-gnu]' >> "${CARGO_HOME}/config.toml"
    - echo 'linker = "gcc"'                     >> "${CARGO_HOME}/config.toml"
    - |
      export CARGO_PROXY=$(cat /run/secrets/CARGO_PROXY)
      if ! [[ "${CARGO_PROXY}" = "false" ]]; then
        echo '[source.crates-io]'                                >> "${CARGO_HOME}/config.toml"
        echo 'replace-with = "crates-io-mirror"'                 >> "${CARGO_HOME}/config.toml"
        echo '[registries.crates-io-mirror]'                     >> "${CARGO_HOME}/config.toml"
        echo 'index = "sparse+http://'"${CARGO_PROXY}"'/index/"' >> "${CARGO_HOME}/config.toml"
      fi
    - cd /src
    - cargo build --release --bin garage
    - cp /src/target/release/garage /garage
    - strip /garage
    - chmod 0755 /garage

---
image: {{ .ModuleNamePrefix }}{{ .ImageName }}
from: {{ index $.Images "builder/distroless" }}

import:
  - image: {{ .ModuleNamePrefix }}{{ .ImageName }}-artifact
    add: /garage
    to: /garage
    before: setup
git:
{{- include "image mount points" . }}

imageSpec:
  config:
    entrypoint: ["/garage"]
    env:
      GARAGE_VERSION: "{{ $garageVersion }}"
