spec:
  versions:
    - name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |
            ObjectStorageClass — заготовка пользовательского ресурса модуля
            sds-object. Замените схему на реальный контракт по мере реализации
            модуля.
          properties:
            spec:
              properties:
                reclaimPolicy:
                  description: Заготовка поля; задаёт желаемую политику высвобождения.
            status:
              properties:
                phase:
                  description: Наблюдаемая стадия жизненного цикла ресурса.
