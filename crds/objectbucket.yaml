apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: objectbuckets.storage.deckhouse.io
  labels:
    heritage: deckhouse
    module: sds-object
    backup.deckhouse.io/cluster-config: "true"
spec:
  group: storage.deckhouse.io
  scope: Namespaced
  names:
    plural: objectbuckets
    singular: objectbucket
    kind: ObjectBucket
    shortNames:
      - ob
  preserveUnknownFields: false
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: |
            ObjectBucket declares a single S3 bucket in an ObjectStorageCluster
            plus the access credentials for it. The controller creates the bucket
            in the backend, generates an access key / secret key scoped to it, and
            writes a Secret in the same namespace (see `status.secretRef`) with the
            standard S3 connection variables so applications can consume it via
            `envFrom` directly.
          required:
            - spec
          x-kubernetes-validations:
            - rule: "size(self.metadata.name) <= 63"
              message: "ObjectBucket metadata.name must not exceed 63 characters."
            - rule: "self.metadata.name.matches('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')"
              message: "ObjectBucket metadata.name must be a valid DNS-1123 label."
          properties:
            spec:
              type: object
              description: |
                Desired state of the bucket.
              required:
                - clusterRef
              x-kubernetes-validations:
                - rule: "oldSelf == null || self.clusterRef == oldSelf.clusterRef"
                  message: "spec.clusterRef is immutable after creation."
                - rule: "oldSelf == null || (has(self.bucketName) == has(oldSelf.bucketName) && (!has(self.bucketName) || self.bucketName == oldSelf.bucketName))"
                  message: "spec.bucketName is immutable after creation."
              properties:
                clusterRef:
                  type: string
                  description: |
                    Name of the ObjectStorageCluster this bucket belongs to. The
                    referenced cluster must exist and be in `Ready` phase before
                    the bucket is provisioned. Immutable after creation.
                  minLength: 1
                  maxLength: 30
                  pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                bucketName:
                  type: string
                  description: |
                    Name of the bucket in S3. Defaults to `metadata.name` when
                    omitted. Must follow S3 bucket naming rules. Immutable after
                    creation.
                  minLength: 3
                  maxLength: 63
                  pattern: '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'
                accessPolicy:
                  type: string
                  description: |
                    Bucket access policy.

                    - `Private` (default) — accessible only with the generated
                      credentials.
                    - `PublicRead` — objects are readable anonymously; writes still
                      require credentials.
                  enum:
                    - Private
                    - PublicRead
                  default: Private
                reclaimPolicy:
                  type: string
                  description: |
                    What happens to bucket data when the ObjectBucket is deleted.

                    - `Retain` (default) — the access key is removed but the bucket
                      and its objects are kept in the backend.
                    - `Delete` — the bucket and all its objects are deleted.
                  enum:
                    - Retain
                    - Delete
                  default: Retain
                quota:
                  type: object
                  description: |
                    Optional usage limits for the bucket. Enforcement depends on
                    backend capabilities.
                  properties:
                    maxSize:
                      type: string
                      description: |
                        Maximum total size of the bucket as a Kubernetes Quantity
                        (BinarySI), e.g. `10Gi`. Omit for no size limit.
                      pattern: '^[0-9]+(\.[0-9]+)?(Ki|Mi|Gi|Ti|Pi|Ei|k|M|G|T|P|E)?$'
                    maxObjects:
                      type: integer
                      format: int64
                      minimum: 0
                      description: |
                        Maximum number of objects. `0` (default) means no limit.
            status:
              type: object
              description: |
                Observed state of the bucket.
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                  description: |
                    Most recent `metadata.generation` reconciled by the controller.
                phase:
                  type: string
                  description: |
                    Coarse-grained summary derived from Conditions.
                  enum:
                    - Pending
                    - InProgress
                    - Ready
                    - Error
                endpoint:
                  type: string
                  description: |
                    In-cluster S3 endpoint URL of the backing cluster.
                bucketName:
                  type: string
                  description: |
                    Effective bucket name created in the backend.
                secretRef:
                  type: object
                  description: |
                    Reference to the Secret (in this ObjectBucket's namespace)
                    holding the S3 connection variables and credentials:
                    `S3_ENDPOINT`, `S3_REGION`, `S3_BUCKET`, `AWS_ACCESS_KEY_ID`,
                    `AWS_SECRET_ACCESS_KEY`.
                  properties:
                    name:
                      type: string
                conditions:
                  type: array
                  description: |
                    Per-component conditions: `BucketReady`, `CredentialsReady`,
                    and the aggregate `Ready`.
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                        description: |
                          Condition type, for example `Ready`, `BucketReady`, or
                          `CredentialsReady`.
                      status:
                        type: string
                        description: Current status of the condition.
                        enum:
                          - "True"
                          - "False"
                          - "Unknown"
                      observedGeneration:
                        type: integer
                        format: int64
                        description: |
                          Value of `metadata.generation` the condition was last set against.
                      lastTransitionTime:
                        type: string
                        format: date-time
                        description: |
                          Timestamp of the last status transition for this condition.
                      reason:
                        type: string
                        description: |
                          Machine-readable reason for the current status, suitable for
                          log filtering.
                      message:
                        type: string
                        description: |
                          Human-readable explanation of the current status.
      subresources:
        status: {}
      additionalPrinterColumns:
        - jsonPath: .spec.clusterRef
          name: Cluster
          type: string
        - jsonPath: .status.bucketName
          name: Bucket
          type: string
        - jsonPath: .status.phase
          name: Phase
          type: string
        - jsonPath: .status.secretRef.name
          name: Secret
          type: string
        - jsonPath: .status.conditions[?(@.type=="Ready")].status
          name: Ready
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
