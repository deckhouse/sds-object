Изменения:
  - Первоначальный каркас модуля (сборка, CI, helm-чарт, заготовки Go-приложений).
  - API объектного хранилища: cluster-scoped ObjectStorageCluster и ObjectStorageBucket, namespaced ObjectStorageBucketAccess (учётные данные S3 по namespace с ротацией ключей по аннотации) и cluster-scoped ObjectStorageBucketPolicy, ограничивающий доступ между namespace (deny-by-default; точные имена и RE2-паттерны).
  - SeaweedFS (профиль Full) использует общий метаданный store PostgreSQL только в HighRedundancy (multi-filer HA); Single/Replicated используют встроенный leveldb на локальном PVC.
  - У ObjectStorageCluster появилось поле spec.reclaimPolicy (по умолчанию Retain), сохраняющее данные бэкенда при удалении кластера (для Heavy пулы Ceph RGW сохраняются, а CephObjectStore не удаляется) — предотвращает случайную потерю данных.
  - Хук удаления модуля снимает финализаторы с namespaced-ресурсов (ObjectStorageBucketAccess) во всех namespace, а не только в namespace модуля — иначе они зависали в Terminating после удаления модуля.
  - Garage (профиль System): работает как StatefulSet с фиксированным числом реплик (3) на control-plane узлах поверх node-sticky local PersistentVolume (пул статических PV с nodeAffinity на управляемом StorageClass sds-object-system-local, создаётся контроллером) вместо DaemonSet «под на мастер», поэтому фактор репликации закреплён на 3 независимо от числа мастеров, и каждая реплика после рестарта возвращается к своим данным. Кворум Garage теперь привязан к числу подов, поэтому хранилище сохраняет read-write при смене числа мастеров (3<->2<->1); layout реконсилится при переезде/возврате реплик. Контроллер watch'ит control-plane узлы и авто-переносит реплики при смене числа мастеров: раскладывает по одной на мастер при 3 узлах и складывает все на один при уменьшении до 1 (по одной реплике за раз, с ожиданием готовности Garage), а также поддерживает пул local-PV.
  - spec.redundancy сделан неизменяемым (смена фактора репликации на живом кластере не поддерживается).
  - SeaweedFS: значения в filer.toml (в т.ч. пароль БД) экранируются по правилам TOML — спецсимволы больше не ломают конфиг.
  - Отключение модуля требует подтверждения и предупреждает о возможной потере данных объектного хранилища (по аналогии с sds-elastic).
